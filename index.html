<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Transfer - Markdown 转富文本工具</title>
  <meta name="description" content="Markdown Transfer 是一款简洁优雅的 Markdown 转富文本工具。在浏览器中完成所有转换，无需服务器，支持实时预览、一键复制到 Word。">
  <meta name="keywords" content="Markdown, 富文本, Word, 转换器, markdown to word, 复制粘贴, 在线工具">
  <meta name="author" content="Markdown Transfer">
  <meta name="robots" content="index, follow">
  <meta name="msvalidate.01" content="08207684CC345ACFD9CF9B8B6A42BF4A">

  <!-- Open Graph -->
  <meta property="og:title" content="Markdown Transfer - Markdown 转富文本工具">
  <meta property="og:description" content="在浏览器中将 Markdown 转换为富文本，一键复制粘贴到 Word、WPS 等文档中。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mt.meorain.cn">
  <meta property="og:site_name" content="Markdown Transfer">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Markdown Transfer - Markdown 转富文本工具">
  <meta name="twitter:description" content="在浏览器中将 Markdown 转换为富文本，一键复制粘贴到 Word、WPS 等文档中。">
  
  <!-- Canonical -->
  <link rel="canonical" href="https://mt.meorain.cn">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">M</div>
        <div class="brand-text">
          <h1>Markdown</h1>
          <span>Transfer</span>
        </div>
      </div>

      <nav class="nav">
        <button id="copy-btn" class="nav-btn primary" aria-label="复制富文本到剪贴板">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          复制富文本
        </button>
        <button id="clear-btn" class="nav-btn" aria-label="清空编辑器内容">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          清空
        </button>
      </nav>

      <div class="hint-box">
        <p>输入 Markdown 文本，右侧实时预览。点击「复制富文本」即可粘贴到 Word。</p>
      </div>

      <a href="https://github.com/sandrone-muou/MarkdownTransfer" target="_blank" rel="noopener noreferrer" class="github-link" aria-label="查看 GitHub 仓库">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
        GitHub
      </a>
    </aside>
    
    <main class="workspace">
      <div class="pane editor-pane">
        <div class="pane-header">
          <div class="pane-title">
            <span class="pane-icon markdown-icon">M</span>
            <span class="pane-label">Markdown</span>
          </div>
          <span class="pane-status">实时编辑</span>
        </div>
        <textarea id="markdown-input" placeholder="在此输入 Markdown 内容，右侧实时转换为富文本预览..." spellcheck="false" aria-label="Markdown 编辑器"></textarea>
      </div>
      
      <div class="pane preview-pane">
        <div class="pane-header">
          <div class="pane-title">
            <span class="pane-icon richtext-icon">R</span>
            <span class="pane-label">富文本</span>
          </div>
          <span class="pane-status">可选中复制</span>
        </div>
        <div id="preview-output" contenteditable="true"></div>
      </div>
    </main>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
